<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美甲價目表</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f0e6e0;
    --rose: #c9a49a;
    --mauve: #b08080;
    --deep: #7a5c58;
    --cream: #faf5f2;
    --warm-white: #fff9f7;
    --text: #5a3e3a;
    --light-text: #9e7a75;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--blush);
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,164,154,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(176,128,128,0.2) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 52px 20px 36px;
    position: relative;
  }

  .brush-title {
    display: inline-block;
    position: relative;
  }

  .brush-title::before {
    content: '';
    position: absolute;
    left: -18px; right: -18px;
    top: 50%; transform: translateY(-50%);
    height: 44px;
    background: linear-gradient(105deg, var(--mauve) 0%, var(--rose) 55%, transparent 100%);
    border-radius: 3px 60% 60% 3px / 50%;
    opacity: 0.55;
    z-index: 0;
  }

  .brush-title h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2rem, 6vw, 3rem);
    color: var(--warm-white);
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 8px rgba(122,92,88,0.3);
  }

  .subtitle {
    font-size: 0.78rem;
    letter-spacing: 0.45em;
    color: var(--mauve);
    margin-top: 10px;
    font-weight: 300;
  }

  .tab-nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 0 20px 32px;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: transparent;
    border: 1.5px solid var(--rose);
    color: var(--mauve);
    padding: 9px 26px;
    border-radius: 30px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .tab-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .tab-btn span { position: relative; z-index: 1; }

  .tab-btn:hover::before,
  .tab-btn.active::before { opacity: 1; }

  .tab-btn:hover,
  .tab-btn.active {
    color: var(--warm-white);
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(176,128,128,0.35);
  }

  .content {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .tab-panel {
    display: none;
    animation: fadeUp 0.4s ease;
  }

  .tab-panel.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow:
      0 2px 0 rgba(176,128,128,0.12),
      0 8px 32px rgba(122,92,88,0.1),
      inset 0 1px 0 rgba(255,255,255,0.9);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--mauve), var(--rose));
  }

  .section-label {
    display: inline-block;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    color: var(--warm-white);
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .section-note {
    font-size: 0.78rem;
    color: var(--light-text);
    margin-bottom: 22px;
    letter-spacing: 0.05em;
  }

  .price-table {
    width: 100%;
    border-collapse: collapse;
  }

  .price-table thead tr {
    border-bottom: 1.5px solid var(--rose);
  }

  .price-table th {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--light-text);
    padding: 0 0 10px;
    font-weight: 400;
    text-align: left;
  }

  .price-table th:last-child { text-align: right; }

  .price-table tbody tr {
    border-bottom: 1px solid rgba(201,164,154,0.2);
    transition: background 0.2s;
  }

  .price-table tbody tr:last-child { border-bottom: none; }

  .price-table tbody tr:hover {
    background: rgba(201,164,154,0.08);
  }

  .price-table td {
    padding: 13px 0;
    font-size: 0.92rem;
    letter-spacing: 0.05em;
  }

  .price-table td:last-child {
    text-align: right;
    color: var(--mauve);
    font-weight: 500;
  }

  .price-table-2col th:nth-child(2),
  .price-table-2col th:nth-child(3) { text-align: right; }

  .price-table-2col td:nth-child(2),
  .price-table-2col td:nth-child(3) {
    text-align: right;
    color: var(--mauve);
    font-weight: 500;
  }

  .discount-banner {
    background: linear-gradient(135deg, var(--mauve) 0%, var(--rose) 60%, #d4a8a0 100%);
    border-radius: 20px;
    padding: 30px 24px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: 0 8px 28px rgba(176,128,128,0.4);
    position: relative;
    overflow: hidden;
  }

  .discount-banner::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  .discount-banner::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -20px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }

  .discount-deco {
    color: rgba(255,255,255,0.6);
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    margin: 4px 0;
  }

  .discount-sub {
    color: rgba(255,255,255,0.88);
    font-size: 0.88rem;
    letter-spacing: 0.15em;
    margin: 8px 0 4px;
  }

  .discount-amount {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 14vw, 4rem);
    font-weight: 600;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 2px 12px rgba(122,92,88,0.3);
    letter-spacing: 0.02em;
    margin: 6px 0;
  }

  .discount-desc {
    color: rgba(255,255,255,0.82);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    margin: 4px 0 8px;
  }

  .notice-card {
    background: linear-gradient(135deg, rgba(201,164,154,0.18), rgba(176,128,128,0.12));
    border: 1.5px solid rgba(201,164,154,0.4);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 20px;
  }

  .notice-title {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.4em;
    color: var(--mauve);
    margin-bottom: 20px;
    position: relative;
  }

  .notice-title::before,
  .notice-title::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 28px;
    height: 1px;
    background: var(--rose);
  }

  .notice-title::before { right: calc(50% + 52px); }
  .notice-title::after  { left:  calc(50% + 52px); }

  .notice-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .notice-item:last-child { margin-bottom: 0; }

  .dot {
    width: 10px;
    height: 10px;
    min-width: 10px;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    border-radius: 50%;
    margin-top: 5px;
  }

  .notice-item p {
    font-size: 0.9rem;
    line-height: 1.8;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .highlight {
    color: var(--mauve);
    font-weight: 500;
  }

  .line-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #00B900;
    color: white;
    text-decoration: none;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    padding: 13px 24px;
    border-radius: 30px;
    margin-top: 18px;
    font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,185,0,0.3);
    transition: all 0.25s ease;
  }

  .line-btn:hover {
    background: #009900;
    box-shadow: 0 6px 20px rgba(0,185,0,0.4);
    transform: translateY(-1px);
  }

  .line-badge {
    display: inline-block;
    background: #00B900;
    color: white;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    margin-right: 4px;
    font-weight: 500;
  }

  footer {
    text-align: center;
    padding-bottom: 32px;
    font-size: 0.72rem;
    color: var(--light-text);
    letter-spacing: 0.2em;
  }

  footer span {
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--rose);
    vertical-align: middle;
    margin: 0 10px;
  }
</style>
</head>
<body>

<header>
  <div class="brush-title">
    <h1>Price List</h1>
  </div>
  <p class="subtitle">美　甲　價　目　表</p>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('gel')" id="btn-gel"><span>凝膠指甲</span></button>
  <button class="tab-btn" onclick="switchTab('remove')" id="btn-remove"><span>彩繪／卸甲</span></button>
  <button class="tab-btn" onclick="switchTab('notice')" id="btn-notice"><span>預約須知</span></button>
</nav>

<main class="content">

  <!-- 凝膠指甲 -->
  <div class="tab-panel active" id="panel-gel">
    <div class="card">
      <div class="section-label">凝膠指甲</div>
      <p class="section-note">（凝膠皆包含修型、保養、加厚）</p>
      <table class="price-table">
        <thead>
          <tr>
            <th>款　式</th>
            <th style="text-align:right">手　部</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>單色</td><td>600</td></tr>
          <tr><td>貓眼</td><td>700</td></tr>
          <tr><td>漸層</td><td>+20 / 指</td></tr>
          <tr><td>法式</td><td>+40 / 指</td></tr>
          <tr><td>蹭粉</td><td>+50 / 指</td></tr>
          <tr><td>跳色</td><td>+50</td></tr>
          <tr><td>延甲</td><td>70 / 指</td></tr>
          <tr><td>十指全延</td><td>600</td></tr>
          <tr><td>貼鑽</td><td>50 up</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 彩繪／卸甲 -->
  <div class="tab-panel" id="panel-remove">
    <div class="card">
      <div class="section-label">彩繪 ／ 卸甲</div>
      <p class="section-note" style="margin-bottom:22px"> </p>
      <table class="price-table price-table-2col">
        <thead>
          <tr>
            <th>服　務</th>
            <th>續做</th>
            <th>純卸甲</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>本店卸甲</td><td>150</td><td>300</td></tr>
          <tr><td>他店卸甲</td><td>250</td><td>400</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 預約須知 -->
  <div class="tab-panel" id="panel-notice">
    <div class="discount-banner">
      <div class="discount-deco">✦</div>
      <p class="discount-sub">於 IG／Threads 標記分享</p>
      <div class="discount-amount">折 $50</div>
      <p class="discount-desc">結帳立即折抵，每次皆可使用！</p>
      <div class="discount-deco">✦</div>
    </div>
    <div class="notice-card">
      <div class="notice-title">預　約　須　知</div>
      <div class="notice-item">
        <div class="dot"></div>
        <p>工作室採<span class="highlight">全預約制</span>，請事先預約後再前往。</p>
      </div>
      <div class="notice-item">
        <div class="dot"></div>
        <p>預約請加官方 <span class="line-badge">LINE</span><span class="highlight">@410jlcle</span></p>
      </div>
      <a href="https://lin.ee/znrJ1pXx" target="_blank" class="line-btn">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4C11.16 4 4 10.27 4 18c0 5.5 3.53 10.33 8.87 13.07L11.5 36l5.3-2.87C17.9 33.37 18.94 33.5 20 33.5 28.84 33.5 36 27.23 36 19.5 36 11.77 28.84 4 20 4zm-6 17.5v-7h2v5.5h3.5v1.5H14zm6 0v-7h2v7h-2zm4.5 0l-3.5-4.5v4.5h-2v-7h2l3.5 4.5V14.5h2v7h-2zm5.5 0h-5v-7h5v1.5h-3v1.3h3v1.4h-3v1.3h3v1.5z"/>
        </svg>
        點我加入官方 LINE 預約
      </a>
    </div>
  </div>

</main>

<footer>
  <span></span> YOUR LOGO <span></span>
</footer>

<script>
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    document.getElementById('btn-' + name).classList.add('active');
  }
</script>
</body>
</html>
